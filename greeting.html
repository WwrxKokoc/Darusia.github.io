<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поздравление</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #2a0015, #000 60%);
    color: white;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 20px;
    overflow-x: hidden;
}

/* Сердечки на фоне */
.heart {
    position: fixed;
    color: #ff3c78;
    font-size: 20px;
    animation: float 6s infinite ease-in-out;
    opacity: 0.5;
    z-index: 0;
}

.heart:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
.heart:nth-child(2) { left: 80%; top: 15%; animation-delay: 1s; }
.heart:nth-child(3) { left: 20%; top: 75%; animation-delay: 2s; }
.heart:nth-child(4) { left: 70%; top: 80%; animation-delay: 3s; }

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0); }
}

/* Карточка */
.card {
    position: relative;
    z-index: 1;

    width: 100%;
    max-width: 550px;

    background: rgba(17, 17, 17, 0.95);
    padding: 30px;
    border-radius: 25px;
    text-align: center;

    box-shadow: 0 0 30px rgba(255, 60, 120, 0.6);
    border: 1px solid rgba(255, 60, 120, 0.4);
}

h1 {
    color: #ff3c78;
    margin-bottom: 15px;
    text-shadow: 0 0 15px #ff3c78;
}

.subtitle {
    color: #ccc;
    font-size: 15px;
    margin-bottom: 25px;
}

.photo {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 25px;
    box-shadow: 0 0 20px rgba(255, 60, 120, 0.5);
}

p {
    color: #d0d0d0;
    font-size: 18px;
    line-height: 1.7;
}

/* Эффект печатания */
#typeText {
    min-height: 230px;
}

/* Кнопки */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;

    background: #1a1a1a;
    color: white;

    border: 2px solid #ff3c78;
    border-radius: 12px;

    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;

    box-shadow: 0 0 15px rgba(255, 60, 120, 0.3);
}

button:hover {
    background: #ff3c78;
    transform: scale(1.03);
}

@media (max-width: 768px) {
    .card {
        padding: 20px;
    }

    h1 {
        font-size: 25px;
    }

    p {
        font-size: 16px;
    }

    #typeText {
        min-height: 260px;
    }
}
</style>
</head>

<body>

<div class="heart">❤️</div>
<div class="heart">💗</div>
<div class="heart">💕</div>
<div class="heart">❤️</div>

<div class="card">

    <h1>❤️ С Днём Рождения ❤️</h1>

    <div class="subtitle">
        Для: Дашки ❤️ <br>
        От: Твоего любимого
    </div>

    <!-- Если хочешь фото, назови его photo.jpg и положи рядом с этим файлом -->
    <!-- <img src="photo.jpg" class="photo"> -->

    <p id="typeText"></p>
    <button id="nextBtn" onclick="nextText()">
    ❤️ Следующее
</button>             

  <button id="gameBtn" onclick="window.location.href='game.html'" style="display:none;">
    💌 Перейти к заданию
</button>

<button id="homeBtn" onclick="window.location.href='index.html'" style="display:none;">
    🏠 Назад на главную
</button>

</div>

<script>

const texts = [

`Сегодня твой день, и я хочу сказать тебе кое-что важное.

Спасибо тебе за то, что ты появилась в моей жизни.
За твой смех, заботу и все моменты вместе.

Я очень сильно люблю тебя ❤️`,

`Иногда мы ссоримся.
Иногда оба вредные и токсичные 😭

Но даже так —
я всё равно хочу быть рядом именно с тобой ❤️`,

`Ты стала частью моей жизни.
И теперь многие мои счастливые моменты связаны именно с тобой.

Спасибо тебе за всё ❤️`,

`Знаешь, честно говоря ,я не думал ,что найду такого человека,как ты.
Конечно ,мы ссоримся очень часто и много ,иногда ощущения ,что у нас холодные отношения.
Но ты в любом случае ,моя маленькая и самая любимая девочка🥺❤️.Иногда вредная злюка ,но любимая).
Знаю тебе не 10 лет ,что бы называть тебя маленькой,но ты для меня всегда будешь масенькой🤏😘.`,

`Во время наших ссор, я очень часто думал.Думал ,что "Ну все ,опять разрушил отношения"
я боюсь,что это оттолкнет тебя.А иногда,
думал "А почему она это делает ,зная что мне не нравится и что мне будет больно",конечно я тебя не веню,
просто задевает.Ну я всегда говорю ,что меня задевает ,что не нравится.К сожалению много чего ,такой уж я человек.
Я это пишу не зная будем ли мы в отношениях на твое ДР.Если мы все ещё в отношениях,то я черзвычайно счастлив😭💋.`,

`Потому что,мне удалось полюбить ,такую нежную,красивую и самую лучшую девушку ,во всем мире.Даже если у нас все,
щас сухо "Не уверен ,что в твой ДР так будет",я буду любить тебя,не смотря ни на что😭❤️.`,

`Ещё ,я хочу попросить прощения за все обиды и за всю боль,то что я тебе причинил.Наверное я ужасный парень,да?😅
Если ты читаешь это и прослезилась ,то я предупреждал ,что будет что-то ,что заденет,по этому прости(`,

`Ещё хочу попросить прощения за мою ревность,за слежку ну и из-за гипер опеку(хз как было правильно)
Знаешь ,я не говорю,что не уверен в тебе и не доверяю.Просто я человек с вечным страхом.Не страх одиночества,
а страх быть обманут и брошенимы обманом,недоговором и тому подобное. Я не люблю ,когда что-то скрывают,по 
этому все время бешу тебя ,когда ты в сети и не отвечаешь или не пишишь.`,

`Были моменты,когда козалось,что моментами не договариваешь или скрываешь что-то,прости пожалуйста ,я знаю
что это очень обидно звучит.Вот такой я плохой.Ну у меня это в ум приходит в основном,когда я спрашиваю тебя
А в ответ,сухость,будто на отвали, но я понимаю,то может настроения нет или одна хочешь побыть,ты главное скажи мне
Что бы я не переживал,хотя я всегда переживаю.`,

`ТАК ,ЛАДНО НЕ О ПЛОХОМ.`,

`Блин, я очень скучаю по тебе ,прям очень.По прошлому лету ,когда мы были вместе,по нашему общению сутками.
Были времена хорошие ,приятные.Надеюсь это лето сделаем ,куда круче и ахуенне😈😈.`,

`Блин я хз,что еще писать,я не мастер поздравлений(.Скорее я мастер по выносу мозгов😆.`,

`Честно говоря, я очень кайфую с нашего общения, особенно когда ты веселая и вкидываешь всякое.
Так нравится,когда ты смеешься и улыбаешься.Улыбка твоя светит ярче чем любая звезда на небе.
Хочу видеть её чаще,по этому улыбайся чаще,солнышко моё🥺❤️.`,

`А ещё ,я так люблю,когда тебя в моей галлерее слишком много,я серьёзно,мне это нравится,
даже больше хочу,фоток и видюшек.Для меня там их очень мало.А ещё,давай много совместных фоток сделаем?)`,

`Я вот все это пишу и плачу,выросла ты уже.Бля в натуре плачу😭`,

`Я не знаю почему,наверное,от того что скучаю очень сильно и от того что люблю тебя очень сильно❤️❤️,
боюсь потерять. Я хочу,что бы ты была всегда счастлива,со мной или без,главное будь счастлива.`,

`Боже ,ты не представляешь ,какой я подарок хочу сделать ,дай бог что бы получился.
Почему я так не увернно это говорю тут,а потому что ,я все это пишу заранее и к сожалению,на данный момент
я не знаю если он получится.`,

`Я знаю что перепрыгиваю быстро на другую тему,что поделать если не умею писать поздравления.
Тебе прийдется меня учить,писать текст поздравлений,все равно ток тебе писать буду их.`,

`Наверное это все.Когда прочтешь и пройдешь игру,напиши мне пожалуйста.
Надеюсь тебе понравится мой поздравительный сайт.
Ещё раз поздравляю с днем рождея дорогая!❤️❤️❤️
Запомни, что бы не случилось, я всегда рядом, всегда помогу и готов быть опорой тебе.
По этому не стесняйся просить что-то.`,

`Бля,как всегда больше грустного и плохого.😮‍💨`
];

let currentText = 0;
let i = 0;

const typeText = document.getElementById("typeText");

function typeWriter() {

    if (i < texts[currentText].length) {

        if (texts[currentText].charAt(i) === "\n") {
            typeText.innerHTML += "<br>";
        }
        else {
            typeText.innerHTML += texts[currentText].charAt(i);
        }

        i++;

        setTimeout(typeWriter, 35);
    }
}

function nextText() {

    currentText++;

    if (currentText >= texts.length) {

        document.getElementById("nextBtn").style.display = "none";

        document.getElementById("gameBtn").style.display = "block";

        document.getElementById("homeBtn").style.display = "block";

        return;
    }

    typeText.innerHTML = "";

    i = 0;

    typeWriter();
}

typeWriter();

</script>

</body>
</html>
